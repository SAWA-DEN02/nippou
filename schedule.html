<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="現場予定表">
<meta name="theme-color" content="#0a0a1a">
<title>現場予定表</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; }
.top-header { background: #0a0a1a; padding: 24px 16px 20px; position: relative; overflow: hidden; text-align: center; }
.top-header .circuit { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
.top-header .title { font-size: 20px; font-weight: 700; color: #fff; position: relative; z-index: 1; text-shadow: 0 0 10px rgba(29,158,117,0.8); }
.top-header .badge { display: inline-block; border: 1px solid #1D9E75; color: #1D9E75; font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 99px; letter-spacing: 0.1em; margin-bottom: 8px; position: relative; z-index: 1; text-shadow: 0 0 6px #1D9E75; box-shadow: 0 0 8px rgba(29,158,117,0.4); }
.container { padding: 16px; max-width: 480px; margin: auto; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.month-nav { display: flex; align-items: center; gap: 12px; }
.nav-btn { background: #fff; border: 1px solid #ddd; border-radius: 10px; width: 40px; height: 40px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
.nav-btn:active { background: #f0f0f0; }
.month-label { font-size: 17px; font-weight: 600; color: #1a1a1a; min-width: 110px; text-align: center; }
.add-btn { background: #1D9E75; border: none; border-radius: 10px; width: 40px; height: 40px; cursor: pointer; color: #fff; font-size: 24px; display: flex; align-items: center; justify-content: center; }
.add-btn:active { opacity: 0.8; }
.weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 4px; }
.weekday { text-align: center; font-size: 11px; font-weight: 600; color: #999; padding: 4px 0; }
.weekday.sun { color: #e53935; }
.weekday.sat { color: #1565C0; }
.calendar { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 2px; }
.day { background: #fff; border-radius: 8px; padding: 4px; min-height: 72px; cursor: pointer; border: 1px solid #eee; overflow: hidden; min-width: 0; }
.day:active { opacity: 0.8; }
.day.today { border-color: #1D9E75; }
.day.other-month { background: #f9f9f9; }
.day .day-num { font-size: 12px; font-weight: 600; color: #1a1a1a; margin-bottom: 2px; }
.day.today .day-num { color: #1D9E75; }
.day.sun .day-num { color: #e53935; }
.day.sat .day-num { color: #1565C0; }
.day.holiday .day-num { color: #e53935; }
.day.other-month .day-num { color: #ccc; }
.holiday-name { font-size: 8px; color: #e53935; font-weight: 500; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.event { border-radius: 4px; padding: 2px 4px; font-size: 9px; font-weight: 500; margin-bottom: 2px; line-height: 1.4; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; display: block; }
.legend { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #666; }
.legend-dot { width: 10px; height: 10px; border-radius: 3px; }
.modal-bg { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; align-items: flex-end; }
.modal-bg.show { display: flex; }
.modal { background: #fff; border-radius: 20px 20px 0 0; padding: 20px 16px 40px; width: 100%; }
.modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
.modal-date { font-size: 14px; color: #666; margin-bottom: 16px; }
.modal label { display: block; font-size: 12px; color: #666; margin-bottom: 5px; font-weight: 500; }
.modal select, .modal input { width: 100%; padding: 13px 14px; border: 1px solid #ddd; border-radius: 12px; background: #fff; color: #1a1a1a; font-size: 16px; font-family: inherit; appearance: none; -webkit-appearance: none; margin-bottom: 12px; }
.modal-btns { display: flex; gap: 10px; margin-top: 8px; }
.modal-btn { flex: 1; padding: 14px; border-radius: 12px; cursor: pointer; font-size: 15px; font-weight: 600; border: 1px solid #ddd; background: #fff; color: #1a1a1a; text-align: center; }
.modal-btn.primary { background: #1D9E75; border-color: #0F6E56; color: #fff; }
.modal-btn:active { opacity: 0.8; }
.event-list { margin-top: 16px; }
.event-item { background: #f5f5f5; border-radius: 10px; padding: 10px 14px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
.event-item .info { font-size: 14px; color: #1a1a1a; }
.event-item .sub { font-size: 12px; color: #666; margin-top: 2px; }
.event-item .del { background: none; border: none; color: #e53935; font-size: 18px; cursor: pointer; padding: 4px; }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); padding: 12px 28px; border-radius: 99px; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; white-space: nowrap; color: #fff; background: #1D9E75; }
.toast.show { opacity: 1; }
.select-wrap { position: relative; margin-bottom: 12px; }
.select-wrap select { margin-bottom: 0; }
.select-wrap .arrow { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); pointer-events: none; color: #999; }
</style>
</head>
<body>

<div class="top-header">
  <svg class="circuit" viewBox="0 0 400 80" xmlns="http://www.w3.org/2000/svg">
    <line x1="0" y1="20" x2="60" y2="20" stroke="#1D9E75" stroke-width="1" opacity="0.4"/>
    <line x1="60" y1="20" x2="60" y2="50" stroke="#1D9E75" stroke-width="1" opacity="0.4"/>
    <circle cx="60" cy="20" r="2" fill="#1D9E75" opacity="0.6"/>
    <line x1="340" y1="15" x2="400" y2="15" stroke="#1D9E75" stroke-width="1" opacity="0.4"/>
    <line x1="340" y1="15" x2="340" y2="60" stroke="#1D9E75" stroke-width="1" opacity="0.4"/>
    <circle cx="340" cy="15" r="2" fill="#1D9E75" opacity="0.6"/>
    <rect x="100" y="30" width="12" height="6" rx="1" fill="none" stroke="#1D9E75" stroke-width="1" opacity="0.4"/>
    <rect x="288" y="40" width="12" height="6" rx="1" fill="none" stroke="#1D9E75" stroke-width="1" opacity="0.4"/>
  </svg>
  <div class="badge">⚡ ELECTRICAL WORK</div>
  <div class="title">現場予定表</div>
</div>

<div class="container">
  <div class="header">
    <div class="month-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
      <div class="month-label" id="monthLabel"></div>
      <button class="nav-btn" onclick="changeMonth(1)">›</button>
    </div>
    <button class="add-btn" onclick="openAddModal()">＋</button>
  </div>

  <div class="weekdays">
    <div class="weekday sun">日</div>
    <div class="weekday">月</div>
    <div class="weekday">火</div>
    <div class="weekday">水</div>
    <div class="weekday">木</div>
    <div class="weekday">金</div>
    <div class="weekday sat">土</div>
  </div>

  <div class="calendar" id="calendar"></div>
  <div class="legend" id="legend"></div>
</div>

<!-- 予定追加モーダル -->
<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal">
    <h3 id="modalTitle">予定を追加</h3>
    <div class="modal-date" id="modalDate"></div>
    <label>現場名</label>
    <div class="select-wrap">
      <select id="modalSite">
        <option value="">選択してください</option>
      </select>
      <span class="arrow">▾</span>
    </div>
    <label>作業者</label>
    <div class="select-wrap">
      <select id="modalWorker">
        <option value="">選択してください</option>
      </select>
      <span class="arrow">▾</span>
    </div>
    <label>メモ（任意）</label>
    <input type="text" id="modalMemo" placeholder="例：午前のみ">
    <div id="eventList" class="event-list"></div>
    <div class="modal-btns">
      <button class="modal-btn" onclick="closeModalDirect()">閉じる</button>
      <button class="modal-btn primary" onclick="addEvent()">追加</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyFkpTdMK815NKHOgawnBzSs6CYLKudXZMunQsD2aBZG0d6FsdDZWmWIwhuii7S-AEy/exec';

const holidays = {
  '2026-01-01':'元日','2026-01-12':'成人の日','2026-02-11':'建国記念の日',
  '2026-02-23':'天皇誕生日','2026-03-20':'春分の日','2026-04-29':'昭和の日',
  '2026-05-03':'憲法記念日','2026-05-04':'みどりの日','2026-05-05':'こどもの日',
  '2026-07-20':'海の日','2026-08-11':'山の日','2026-09-21':'敬老の日',
  '2026-09-23':'秋分の日','2026-10-12':'スポーツの日','2026-11-03':'文化の日',
  '2026-11-23':'勤労感謝の日',
  '2027-01-01':'元日','2027-01-11':'成人の日','2027-02-11':'建国記念の日',
  '2027-02-23':'天皇誕生日','2027-03-21':'春分の日','2027-04-29':'昭和の日',
  '2027-05-03':'憲法記念日','2027-05-04':'みどりの日','2027-05-05':'こどもの日',
};

const workerColors = [
  { bg: '#E1F5EE', text: '#0F6E56', border: '#1D9E75' },
  { bg: '#E3F2FD', text: '#1565C0', border: '#1565C0' },
  { bg: '#FFF3E0', text: '#E65100', border: '#FF9800' },
  { bg: '#FCE4EC', text: '#880E4F', border: '#E91E63' },
];

let current = new Date();
let selectedDate = '';
let events = {};
let sites = [];
let workers = [];

async function loadData() {
  try {
    const [sRes, wRes] = await Promise.all([
      fetch(GAS_URL + '?type=sites'),
      fetch(GAS_URL + '?type=workers')
    ]);
    const sData = await sRes.json();
    const wData = await wRes.json();
    if (sData.status === 'ok') sites = sData.data;
    if (wData.status === 'ok') workers = wData.data;
  } catch(e) {}
  try {
    const saved = localStorage.getItem('schedule_events');
    if (saved) events = JSON.parse(saved);
  } catch(e) {}
  renderLegend();
  render();
}

function saveEvents() {
  localStorage.setItem('schedule_events', JSON.stringify(events));
}

function getWorkerColor(worker) {
  const idx = workers.indexOf(worker);
  return workerColors[idx % workerColors.length] || workerColors[0];
}

function renderLegend() {
  const el = document.getElementById('legend');
  if (workers.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = workers.map(w => {
    const c = getWorkerColor(w);
    return `<div class="legend-item"><div class="legend-dot" style="background:${c.bg};border:1px solid ${c.border};"></div>${w}</div>`;
  }).join('');
}

function changeMonth(diff) {
  current = new Date(current.getFullYear(), current.getMonth() + diff, 1);
  render();
}

function render() {
  const y = current.getFullYear();
  const m = current.getMonth();
  document.getElementById('monthLabel').textContent = `${y}年${m+1}月`;
  const today = new Date();
  const firstDay = new Date(y, m, 1).getDay();
  const lastDate = new Date(y, m+1, 0).getDate();
  const prevLast = new Date(y, m, 0).getDate();
  let html = '';
  let day = 1, nextDay = 1;
  for (let i = 0; i < 42; i++) {
    const col = i % 7;
    let num = '', cls = '', dateStr = '';
    if (i < firstDay) {
      num = prevLast - firstDay + i + 1;
      cls = 'other-month';
    } else if (day <= lastDate) {
      num = day;
      dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(num).padStart(2,'0')}`;
      if (today.getFullYear()===y && today.getMonth()===m && today.getDate()===num) cls += ' today';
      if (col === 0) cls += ' sun';
      if (col === 6) cls += ' sat';
      if (holidays[dateStr]) cls += ' holiday';
      day++;
    } else { num = nextDay++; cls = 'other-month'; }

    const holidayName = holidays[dateStr] ? `<div class="holiday-name">${holidays[dateStr]}</div>` : '';
    const dayEvents = (events[dateStr] || []).slice(0, 2);
    const evHtml = dayEvents.map(e => {
      const c = getWorkerColor(e.worker);
      return `<div class="event" style="background:${c.bg};color:${c.text};">${e.site}</div>`;
    }).join('');
    const more = (events[dateStr] || []).length > 2 ? `<div style="font-size:8px;color:#999;">+${(events[dateStr]||[]).length - 2}件</div>` : '';
    const click = dateStr ? `onclick="openDayModal('${dateStr}')"` : '';
    html += `<div class="day ${cls}" ${click}><div class="day-num">${num}</div>${holidayName}${evHtml}${more}</div>`;
  }
  document.getElementById('calendar').innerHTML = html;
}

function openAddModal(date) {
  selectedDate = date || '';
  document.getElementById('modalTitle').textContent = date ? `予定を追加` : '予定を追加';
  document.getElementById('modalDate').textContent = date ? formatDate(date) : '';

  const siteSel = document.getElementById('modalSite');
  siteSel.innerHTML = '<option value="">選択してください</option>';
  sites.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; siteSel.appendChild(o); });

  const workerSel = document.getElementById('modalWorker');
  workerSel.innerHTML = '<option value="">選択してください</option>';
  workers.forEach(w => { const o = document.createElement('option'); o.value = w; o.textContent = w; workerSel.appendChild(o); });

  document.getElementById('modalMemo').value = '';
  renderEventList(date);
  document.getElementById('modalBg').classList.add('show');
}

function openDayModal(date) {
  selectedDate = date;
  openAddModal(date);
}

function closeModal(e) {
  if (e.target === document.getElementById('modalBg')) closeModalDirect();
}

function closeModalDirect() {
  document.getElementById('modalBg').classList.remove('show');
}

function renderEventList(date) {
  const el = document.getElementById('eventList');
  if (!date) { el.innerHTML = ''; return; }
  const dayEvents = events[date] || [];
  if (dayEvents.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = '<div style="font-size:12px;color:#666;margin-bottom:8px;">この日の予定</div>' +
    dayEvents.map((e, i) => {
      const c = getWorkerColor(e.worker);
      return `<div class="event-item">
        <div>
          <div class="info" style="color:${c.text};">${e.site}</div>
          <div class="sub">${e.worker}${e.memo ? '　' + e.memo : ''}</div>
        </div>
        <button class="del" onclick="deleteEvent('${date}', ${i})">✕</button>
      </div>`;
    }).join('');
}

function addEvent() {
  const site = document.getElementById('modalSite').value;
  const worker = document.getElementById('modalWorker').value;
  const memo = document.getElementById('modalMemo').value.trim();
  if (!selectedDate) { alert('日付を選択してください'); return; }
  if (!site) { alert('現場名を選択してください'); return; }
  if (!worker) { alert('作業者を選択してください'); return; }
  if (!events[selectedDate]) events[selectedDate] = [];
  events[selectedDate].push({ site, worker, memo });
  saveEvents();
  renderEventList(selectedDate);
  render();
  showToast('予定を追加しました');
  document.getElementById('modalSite').value = '';
  document.getElementById('modalWorker').value = '';
  document.getElementById('modalMemo').value = '';
}

function deleteEvent(date, idx) {
  events[date].splice(idx, 1);
  if (events[date].length === 0) delete events[date];
  saveEvents();
  renderEventList(date);
  render();
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const wd = ['日','月','火','水','木','金','土'][d.getDay()];
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${wd}）`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

loadData();
</script>
</body>
</html>
