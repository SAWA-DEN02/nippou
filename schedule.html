<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="現場予定表">
<meta name="theme-color" content="#0a0a1a">
<title>現場予定表</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a1a; color: #fff; min-height: 100vh; position: relative; overflow-x: hidden; }
.circuit-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
.container { padding: 8px 16px 16px; max-width: 480px; margin: auto; position: relative; z-index: 1; }
.top-title { text-align: center; padding: 8px 0 6px; }
.top-title .badge { display: inline-block; border: 1px solid #1D9E75; color: #1D9E75; font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 99px; letter-spacing: 0.1em; margin-bottom: 6px; text-shadow: 0 0 6px #1D9E75; box-shadow: 0 0 8px rgba(29,158,117,0.4); }
.top-title .title { font-size: 15px; font-weight: 700; color: #fff; text-shadow: 0 0 10px rgba(29,158,117,0.8); }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.month-nav { display: flex; align-items: center; gap: 12px; }
.nav-btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(29,158,117,0.4); border-radius: 10px; width: 40px; height: 40px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; color: #1D9E75; }
.nav-btn:active { background: rgba(29,158,117,0.2); }
.month-label { font-size: 17px; font-weight: 600; color: #fff; min-width: 110px; text-align: center; text-shadow: 0 0 8px rgba(29,158,117,0.6); }
.weekdays { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 2px; margin-bottom: 4px; }
.weekday { text-align: center; font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.4); padding: 4px 0; }
.weekday.sun { color: #ef9a9a; }
.weekday.sat { color: #90caf9; }
.calendar { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 2px; }
.day { background: rgba(255,255,255,0.05); border-radius: 8px; padding: 4px; min-height: 110px; cursor: pointer; border: 1px solid rgba(255,255,255,0.08); overflow: hidden; min-width: 0; }
.day:active { background: rgba(29,158,117,0.15); }
.day.today { border-color: #1D9E75; box-shadow: 0 0 8px rgba(29,158,117,0.3); }
.day.other-month { background: rgba(255,255,255,0.02); opacity: 0.4; }
.day .day-num { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.8); margin-bottom: 2px; }
.day.today .day-num { color: #1D9E75; text-shadow: 0 0 6px rgba(29,158,117,0.8); }
.day.sun .day-num { color: #ef9a9a; }
.day.sat .day-num { color: #90caf9; }
.day.holiday .day-num { color: #ef9a9a; }
.day.other-month .day-num { color: rgba(255,255,255,0.2); }
.holiday-name { font-size: 8px; color: #ef9a9a; font-weight: 500; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.event { border-radius: 4px; padding: 2px 4px; font-size: 9px; font-weight: 500; margin-bottom: 2px; line-height: 1.4; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; display: block; }
.more { font-size: 8px; color: rgba(255,255,255,0.4); }
.legend { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; padding-bottom: 24px; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: rgba(255,255,255,0.6); }
.legend-dot { width: 10px; height: 10px; border-radius: 3px; }

/* 日付詳細モーダル */
.modal-bg { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 100; align-items: flex-end; }
.modal-bg.show { display: flex; }
.modal { background: #1a1a2e; border-radius: 20px 20px 0 0; padding: 20px 16px 40px; width: 100%; border-top: 1px solid rgba(29,158,117,0.4); max-height: 85vh; overflow-y: auto; }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.modal-title { font-size: 18px; font-weight: 700; color: #fff; }
.modal-close { background: none; border: none; color: rgba(255,255,255,0.4); font-size: 24px; cursor: pointer; padding: 4px; }
.modal-date { font-size: 13px; color: #1D9E75; margin-bottom: 16px; }
.schedule-list { margin-bottom: 16px; }
.schedule-empty { font-size: 14px; color: rgba(255,255,255,0.3); text-align: center; padding: 20px 0; }
.schedule-item { background: rgba(255,255,255,0.06); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; border: 1px solid rgba(255,255,255,0.08); }
.schedule-item .info .site { font-size: 15px; font-weight: 600; }
.schedule-item .info .worker { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 3px; }
.schedule-item .info .memo { font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 2px; }
.schedule-item .del { background: none; border: none; color: #ef9a9a; font-size: 20px; cursor: pointer; padding: 4px; flex-shrink: 0; }

/* 予定追加フォーム */
.add-form { display: none; background: rgba(255,255,255,0.04); border-radius: 14px; padding: 14px; border: 1px solid rgba(29,158,117,0.3); margin-bottom: 12px; }
.add-form.show { display: block; }
.add-form label { display: block; font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 5px; font-weight: 500; }
.add-form select, .add-form input { width: 100%; padding: 13px 14px; border: 1px solid rgba(29,158,117,0.3); border-radius: 12px; background: rgba(255,255,255,0.08); color: #fff; font-size: 16px; font-family: inherit; appearance: none; -webkit-appearance: none; margin-bottom: 10px; }
.add-form select option { background: #1a1a2e; color: #fff; }
.form-btns { display: flex; gap: 8px; }
.form-btn { flex: 1; padding: 12px; border-radius: 12px; cursor: pointer; font-size: 14px; font-weight: 600; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); color: #fff; text-align: center; }
.form-btn.primary { background: #1D9E75; border-color: #0F6E56; color: #fff; }
.form-btn:active { opacity: 0.8; }
.open-form-btn { width: 100%; padding: 14px; border-radius: 12px; cursor: pointer; font-size: 15px; font-weight: 600; border: 1px solid rgba(29,158,117,0.5); background: rgba(29,158,117,0.1); color: #1D9E75; text-align: center; display: flex; align-items: center; justify-content: center; gap: 6px; }
.open-form-btn:active { background: rgba(29,158,117,0.2); }

.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); padding: 12px 28px; border-radius: 99px; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; white-space: nowrap; color: #fff; background: #1D9E75; box-shadow: 0 0 12px rgba(29,158,117,0.5); }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<svg class="circuit-bg" viewBox="0 0 400 800" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <line x1="0" y1="40" x2="70" y2="40" stroke="#1D9E75" stroke-width="1" opacity="0.3"/>
  <line x1="70" y1="40" x2="70" y2="100" stroke="#1D9E75" stroke-width="1" opacity="0.3"/>
  <line x1="70" y1="100" x2="140" y2="100" stroke="#1D9E75" stroke-width="1" opacity="0.3"/>
  <circle cx="70" cy="40" r="2.5" fill="#1D9E75" opacity="0.5"/>
  <circle cx="70" cy="100" r="2.5" fill="#1D9E75" opacity="0.5"/>
  <circle cx="140" cy="100" r="2.5" fill="#1D9E75" opacity="0.5"/>
  <rect x="128" y="93" width="16" height="8" rx="1.5" fill="none" stroke="#1D9E75" stroke-width="1" opacity="0.4"/>
  <line x1="330" y1="30" x2="400" y2="30" stroke="#1D9E75" stroke-width="1" opacity="0.3"/>
  <line x1="330" y1="30" x2="330" y2="90" stroke="#1D9E75" stroke-width="1" opacity="0.3"/>
  <line x1="270" y1="90" x2="330" y2="90" stroke="#1D9E75" stroke-width="1" opacity="0.3"/>
  <circle cx="330" cy="30" r="2.5" fill="#1D9E75" opacity="0.5"/>
  <circle cx="330" cy="90" r="2.5" fill="#1D9E75" opacity="0.5"/>
  <rect x="258" y="83" width="16" height="8" rx="1.5" fill="none" stroke="#1D9E75" stroke-width="1" opacity="0.4"/>
  <line x1="0" y1="300" x2="50" y2="300" stroke="#1D9E75" stroke-width="1" opacity="0.2"/>
  <line x1="50" y1="300" x2="50" y2="360" stroke="#1D9E75" stroke-width="1" opacity="0.2"/>
  <circle cx="50" cy="300" r="2" fill="#1D9E75" opacity="0.3"/>
  <line x1="350" y1="400" x2="400" y2="400" stroke="#1D9E75" stroke-width="1" opacity="0.2"/>
  <circle cx="350" cy="400" r="2" fill="#1D9E75" opacity="0.3"/>
  <line x1="0" y1="600" x2="80" y2="600" stroke="#1D9E75" stroke-width="1" opacity="0.15"/>
  <line x1="80" y1="600" x2="80" y2="650" stroke="#1D9E75" stroke-width="1" opacity="0.15"/>
  <circle cx="80" cy="600" r="2" fill="#1D9E75" opacity="0.2"/>
  <line x1="300" y1="700" x2="400" y2="700" stroke="#1D9E75" stroke-width="1" opacity="0.15"/>
  <circle cx="300" cy="700" r="2" fill="#1D9E75" opacity="0.2"/>
</svg>

<div class="container">
  <div class="top-title">
    <div class="badge">⚡ ELECTRICAL WORK</div>
    <div class="title">現場予定表</div>
  </div>

  <div class="header">
    <div class="month-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
      <div class="month-label" id="monthLabel"></div>
      <button class="nav-btn" onclick="changeMonth(1)">›</button>
    </div>
  </div>

  <div class="weekdays">
    <div class="weekday sun">日</div>
    <div class="weekday">月</div>
    <div class="weekday">火</div>
    <div class="weekday">水</div>
    <div class="weekday">木</div>
    <div class="weekday">金</div>
    <div class="weekday sat">土</div>
  </div>

  <div class="calendar" id="calendar"></div>
  <div class="legend" id="legend"></div>
</div>

<!-- 日付詳細モーダル -->
<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="closeModalDirect()">×</button>
    </div>
    <div class="modal-date" id="modalDate"></div>

    <!-- 予定一覧 -->
    <div class="schedule-list" id="scheduleList"></div>

    <!-- 予定追加ボタン -->
    <button class="open-form-btn" id="openFormBtn" onclick="toggleForm()">＋ 予定を追加</button>

    <!-- 予定追加フォーム -->
    <div class="add-form" id="addForm">
      <label>現場名</label>
      <select id="modalSite">
        <option value="">選択してください</option>
      </select>
      <label>作業者</label>
      <select id="modalWorker">
        <option value="">選択してください</option>
      </select>
      <label>メモ（任意）</label>
      <input type="text" id="modalMemo" placeholder="例：午前のみ">
      <div class="form-btns">
        <button class="form-btn" onclick="toggleForm()">キャンセル</button>
        <button class="form-btn primary" onclick="addEvent()">追加する</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyFkpTdMK815NKHOgawnBzSs6CYLKudXZMunQsD2aBZG0d6FsdDZWmWIwhuii7S-AEy/exec';

const holidays = {
  '2026-01-01':'元日','2026-01-12':'成人の日','2026-02-11':'建国記念の日',
  '2026-02-23':'天皇誕生日','2026-03-20':'春分の日','2026-04-29':'昭和の日',
  '2026-05-03':'憲法記念日','2026-05-04':'みどりの日','2026-05-05':'こどもの日',
  '2026-07-20':'海の日','2026-08-11':'山の日','2026-09-21':'敬老の日',
  '2026-09-23':'秋分の日','2026-10-12':'スポーツの日','2026-11-03':'文化の日',
  '2026-11-23':'勤労感謝の日',
  '2027-01-01':'元日','2027-01-11':'成人の日','2027-02-11':'建国記念の日',
  '2027-02-23':'天皇誕生日','2027-03-21':'春分の日','2027-04-29':'昭和の日',
  '2027-05-03':'憲法記念日','2027-05-04':'みどりの日','2027-05-05':'こどもの日',
};

const workerColors = [
  { bg: 'rgba(29,158,117,0.25)', text: '#4ecca3', border: '#1D9E75' },
  { bg: 'rgba(21,101,192,0.25)', text: '#90caf9', border: '#1565C0' },
  { bg: 'rgba(230,81,0,0.25)', text: '#ffcc80', border: '#FF9800' },
  { bg: 'rgba(136,14,79,0.25)', text: '#f48fb1', border: '#E91E63' },
];

let current = new Date();
let selectedDate = '';
let events = {};
let sites = [];
let workers = [];

async function loadData() {
  try {
    const [sRes, wRes] = await Promise.all([
      fetch(GAS_URL + '?type=sites'),
      fetch(GAS_URL + '?type=workers')
    ]);
    const sData = await sRes.json();
    const wData = await wRes.json();
    if (sData.status === 'ok') sites = sData.data;
    if (wData.status === 'ok') workers = wData.data;
  } catch(e) {}
  try {
    const saved = localStorage.getItem('schedule_events');
    if (saved) events = JSON.parse(saved);
  } catch(e) {}
  renderLegend();
  render();
}

function saveEvents() {
  localStorage.setItem('schedule_events', JSON.stringify(events));
}

function getWorkerColor(worker) {
  const idx = workers.indexOf(worker);
  return workerColors[idx % workerColors.length] || workerColors[0];
}

function renderLegend() {
  const el = document.getElementById('legend');
  if (workers.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = workers.map(w => {
    const c = getWorkerColor(w);
    return `<div class="legend-item"><div class="legend-dot" style="background:${c.bg};border:1px solid ${c.border};"></div>${w}</div>`;
  }).join('');
}

function changeMonth(diff) {
  current = new Date(current.getFullYear(), current.getMonth() + diff, 1);
  render();
}

function render() {
  const y = current.getFullYear();
  const m = current.getMonth();
  document.getElementById('monthLabel').textContent = `${y}年${m+1}月`;
  const today = new Date();
  const firstDay = new Date(y, m, 1).getDay();
  const lastDate = new Date(y, m+1, 0).getDate();
  const prevLast = new Date(y, m, 0).getDate();
  const totalDays = firstDay + lastDate;
  const totalCells = Math.ceil(totalDays / 7) * 7;
  let html = '';
  let day = 1, nextDay = 1;
  for (let i = 0; i < totalCells; i++) {
    const col = i % 7;
    let num = '', cls = '', dateStr = '';
    if (i < firstDay) {
      num = prevLast - firstDay + i + 1;
      cls = 'other-month';
    } else if (day <= lastDate) {
      num = day;
      dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(num).padStart(2,'0')}`;
      if (today.getFullYear()===y && today.getMonth()===m && today.getDate()===num) cls += ' today';
      if (col === 0) cls += ' sun';
      if (col === 6) cls += ' sat';
      if (holidays[dateStr]) cls += ' holiday';
      day++;
    } else { num = nextDay++; cls = 'other-month'; }

    const holidayName = holidays[dateStr] ? `<div class="holiday-name">${holidays[dateStr]}</div>` : '';
    const dayEvents = events[dateStr] || [];
    const evHtml = dayEvents.slice(0, 2).map(e => {
      const c = getWorkerColor(e.worker);
      return `<div class="event" style="background:${c.bg};color:${c.text};">${e.site}</div>`;
    }).join('');
    const more = dayEvents.length > 2 ? `<div class="more">+${dayEvents.length - 2}</div>` : '';
    const click = dateStr ? `onclick="openDayModal('${dateStr}')"` : '';
    html += `<div class="day ${cls}" ${click}><div class="day-num">${num}</div>${holidayName}${evHtml}${more}</div>`;
  }
  document.getElementById('calendar').innerHTML = html;
}

function openDayModal(date) {
  selectedDate = date;
  const d = new Date(date + 'T00:00:00');
  const wd = ['日','月','火','水','木','金','土'][d.getDay()];
  document.getElementById('modalTitle').textContent = `${d.getMonth()+1}月${d.getDate()}日（${wd}）`;
  const holiday = holidays[date];
  document.getElementById('modalDate').textContent = holiday ? `🎌 ${holiday}` : '';

  const siteSel = document.getElementById('modalSite');
  siteSel.innerHTML = '<option value="">選択してください</option>';
  sites.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; siteSel.appendChild(o); });

  const workerSel = document.getElementById('modalWorker');
  workerSel.innerHTML = '<option value="">選択してください</option>';
  workers.forEach(w => { const o = document.createElement('option'); o.value = w; o.textContent = w; workerSel.appendChild(o); });

  document.getElementById('modalMemo').value = '';
  document.getElementById('addForm').classList.remove('show');
  document.getElementById('openFormBtn').style.display = 'flex';

  renderScheduleList(date);
  document.getElementById('modalBg').classList.add('show');
}

function toggleForm() {
  const form = document.getElementById('addForm');
  const btn = document.getElementById('openFormBtn');
  if (form.classList.contains('show')) {
    form.classList.remove('show');
    btn.style.display = 'flex';
  } else {
    form.classList.add('show');
    btn.style.display = 'none';
    document.getElementById('modalSite').value = '';
    document.getElementById('modalWorker').value = '';
    document.getElementById('modalMemo').value = '';
  }
}

function renderScheduleList(date) {
  const el = document.getElementById('scheduleList');
  const dayEvents = events[date] || [];
  if (dayEvents.length === 0) {
    el.innerHTML = '<div class="schedule-empty">予定はありません</div>';
    return;
  }
  el.innerHTML = dayEvents.map((e, i) => {
    const c = getWorkerColor(e.worker);
    return `<div class="schedule-item">
      <div class="info">
        <div class="site" style="color:${c.text};">${e.site}</div>
        <div class="worker">${e.worker}</div>
        ${e.memo ? `<div class="memo">${e.memo}</div>` : ''}
      </div>
      <button class="del" onclick="deleteEvent('${date}', ${i})">✕</button>
    </div>`;
  }).join('');
}

function addEvent() {
  const site = document.getElementById('modalSite').value;
  const worker = document.getElementById('modalWorker').value;
  const memo = document.getElementById('modalMemo').value.trim();
  if (!site) { alert('現場名を選択してください'); return; }
  if (!worker) { alert('作業者を選択してください'); return; }
  if (!events[selectedDate]) events[selectedDate] = [];
  events[selectedDate].push({ site, worker, memo });
  saveEvents();
  renderScheduleList(selectedDate);
  render();
  toggleForm();
  showToast('予定を追加しました');
}

function deleteEvent(date, idx) {
  events[date].splice(idx, 1);
  if (events[date].length === 0) delete events[date];
  saveEvents();
  renderScheduleList(date);
  render();
}

function closeModal(e) {
  if (e.target === document.getElementById('modalBg')) closeModalDirect();
}

function closeModalDirect() {
  document.getElementById('modalBg').classList.remove('show');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

loadData();
</script>
</body>
</html>
